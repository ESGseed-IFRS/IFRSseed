# CI: PR·main 푸시 시 린트·테스트·compile
# CD: main 푸시 또는 수동 실행 시에만 EC2 배포 (PR 은 CI 만)
#
# Secrets: EC2_HOST, EC2_USER, EC2_SSH_KEY
# 선택: EC2_DEPLOY_PATH, EC2_SSH_PORT, EC2_SERVICE_NAME
#
# EC2_DEPLOY_PATH: 서버에서 backend 디렉터리의 부모 (예: /home/ubuntu/app)
#   → 코드는 $EC2_DEPLOY_PATH/backend/ 에 배치됩니다.
#   미설정 시 자동으로 /home/<EC2_USER>/app 을 사용합니다.
#   rsync 전에 원격에 $EC2_DEPLOY_PATH/backend 가 없으면 mkdir -p 로 생성합니다.
#   pip: CUDA용 torch/torchvision 선설치(PyTorch cu124 인덱스) + 캐시 끔. GPU 인스턴스·NVIDIA 드라이버 필요.
#   디스크 여유(권장 40GiB+) 부족 시 No space left 가능.
#
# SSH 실패 시: (1) 시크릿은 해당 인스턴스 authorized_keys와 짝인 "개인키" 전체
# (2) EC2_USER는 ubuntu / ec2-user 등 실제 로그인 사용자 (3) 포트·보안그룹
# (4) 암호가 걸린 PEM은 비대화식이라 실패 → 암호 없는 키 사용
#
name: CI & Deploy to EC2

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "pyproject.toml"
      - ".github/workflows/deploy.yml"
  pull_request:
    paths:
      - "backend/**"
      - "pyproject.toml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-deploy-ec2-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: Lint, test, compile
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirement.txt
            backend/requirements-dev.txt

      - name: Install dev tools
        run: |
          python -m pip install --upgrade pip wheel
          pip install --no-cache-dir -r backend/requirements-dev.txt

      - name: Install backend dependencies
        run: pip install --no-cache-dir -r backend/requirement.txt

      - name: Ruff lint
        run: ruff check backend

      - name: Pytest
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest

      - name: Byte-compile (smoke)
        run: python -m compileall backend -q

  deploy:
    name: Deploy to EC2
    needs: ci
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start ssh-agent (EC2 개인키)
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: known_hosts 및 연결 변수
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # USER/HOST 는 러너 환경변수와 충돌할 수 있어 전용 이름 사용
          EC2_HOST_VAL=$(echo -n "${{ secrets.EC2_HOST }}" | tr -d '\r' | xargs)
          EC2_USER_VAL=$(echo -n "${{ secrets.EC2_USER }}" | tr -d '\r' | xargs)
          SSH_PORT_VAL=$(echo -n "${{ secrets.EC2_SSH_PORT }}" | tr -d '\r' | xargs)
          if [ -z "$EC2_HOST_VAL" ] || [ -z "$EC2_USER_VAL" ]; then
            echo "::error::EC2_HOST 또는 EC2_USER 시크릿이 비어 있거나 공백만 있습니다."
            exit 1
          fi
          if [ -z "$SSH_PORT_VAL" ]; then SSH_PORT_VAL=22; fi
          echo "SSH_PORT=$SSH_PORT_VAL" >> "$GITHUB_ENV"
          echo "EC2_HOST_TR=$EC2_HOST_VAL" >> "$GITHUB_ENV"
          echo "EC2_USER_TR=$EC2_USER_VAL" >> "$GITHUB_ENV"
          if ! timeout 25 ssh-keyscan -p "$SSH_PORT_VAL" -H "$EC2_HOST_VAL" >> ~/.ssh/known_hosts 2>/tmp/keyscan.err; then
            echo "::error::ssh-keyscan 실패 — EC2 퍼블릭 DNS/IP, 보안그룹 SSH 인바운드, 인스턴스 running 여부를 확인하세요."
            head -20 /tmp/keyscan.err >&2 || true
            exit 1
          fi
          echo "=== 로드된 키 지문 (민감정보 아님). AWS EC2 키 페어 지문과 종류가 맞는지 확인 ==="
          ssh-add -l || true

      - name: SSH 연결 확인 (rsync 전)
        env:
          DEPLOY_PATH_RAW: ${{ secrets.EC2_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          DEPLOY_PATH=$(echo -n "${DEPLOY_PATH_RAW:-}" | tr -d '\r' | xargs)
          if [ -z "$DEPLOY_PATH" ]; then
            DEPLOY_PATH="/home/${EC2_USER_TR}/app"
            echo "::notice::EC2_DEPLOY_PATH 시크릿이 없어 기본값을 사용합니다: $DEPLOY_PATH (다르면 시크릿으로 지정하세요)"
          fi
          echo "EC2_DEPLOY_PATH_TR=$DEPLOY_PATH" >> "$GITHUB_ENV"
          # IdentitiesOnly=yes 는 에이전트 키를 막을 수 있어 기본(에이전트 사용)으로 접속
          ssh -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=25 \
            -p "${SSH_PORT}" \
            "${EC2_USER_TR}@${EC2_HOST_TR}" \
            "echo 'ssh ok'"

      - name: 원격 배포 경로 생성 (mkdir -p)
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=25 \
            -p "${SSH_PORT}" \
            "${EC2_USER_TR}@${EC2_HOST_TR}" \
            "mkdir -p '${EC2_DEPLOY_PATH_TR}/backend'"

      - name: Rsync to EC2 (→ .../backend/)
        run: |
          rsync -avz --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '**/__pycache__/' \
            --exclude '*.pyc' \
            --exclude '.env' \
            --exclude '*.pem' \
            --exclude '**/llamaparse_md/' \
            -e "ssh -o BatchMode=yes -o StrictHostKeyChecking=yes -p ${SSH_PORT}" \
            ./backend/ "${EC2_USER_TR}@${EC2_HOST_TR}:${EC2_DEPLOY_PATH_TR}/backend/"

      - name: Install dependencies and restart service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.EC2_HOST_TR }}
          username: ${{ env.EC2_USER_TR }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ env.SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ env.EC2_DEPLOY_PATH_TR }}"
            # Ubuntu minimal AMI에는 python3-venv 없음 → python3 -m venv 가 ensurepip 오류로 실패
            if command -v apt-get >/dev/null 2>&1 && ! dpkg -s python3-venv >/dev/null 2>&1; then
              sudo apt-get update -qq
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y python3-venv
            fi
            # 이전 실패로 .venv만 있고 activate 없는 경우가 있어, 완전할 때만 유지
            if [ ! -f .venv/bin/activate ] || [ ! -x .venv/bin/python3 ]; then
              rm -rf .venv
              python3 -m venv .venv
            fi
            . .venv/bin/activate
            export PIP_NO_CACHE_DIR=1
            sudo apt-get clean || true
            rm -rf "${HOME}/.cache/pip" 2>/dev/null || true
            df -h
            pip install --no-cache-dir -U pip wheel
            # CPU 토치 잔여 시 CUDA 휠과 섞일 수 있어 제거 후 GPU 빌드 설치 (cu124, 드라이버 550+ 권장)
            pip uninstall -y torch torchvision torchaudio 2>/dev/null || true
            pip install --no-cache-dir torch torchvision --index-url https://download.pytorch.org/whl/cu124
            pip install --no-cache-dir --upgrade-strategy only-if-needed -r backend/requirement.txt
            SERVICE_NAME=$(echo -n "${{ secrets.EC2_SERVICE_NAME }}" | tr -d '\r' | xargs)
            if [ -z "$SERVICE_NAME" ]; then
              echo "::warning::EC2_SERVICE_NAME 시크릿이 없어 서비스 재시작을 건너뜁니다."
              exit 0
            fi
            if ! systemctl list-unit-files --type=service --no-pager | grep -Fq "${SERVICE_NAME}.service"; then
              echo "::warning::${SERVICE_NAME}.service 유닛을 찾지 못해 서비스 재시작을 건너뜁니다."
              exit 0
            fi
            sudo systemctl restart "$SERVICE_NAME"
